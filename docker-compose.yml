services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DOCKER_MODE=1
      - JWT_SECRET=text2sql-docker-secret-change-me
      - PORT=3001
      - NEXT_PUBLIC_WEB_URL=http://localhost:3000
      - API_URL=http://localhost:3001
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=text2sql
      - POSTGRES_USER=text2sql
      - POSTGRES_PASSWORD=text2sql
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/docker-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U text2sql"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
